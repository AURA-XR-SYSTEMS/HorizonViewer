name: Publish Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
  MAINLINE_TAG: edge

jobs:
  publish-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate registry configuration
        run: |
          test -n "$REGISTRY_HOST" || { echo 'Missing REGISTRY_HOST secret'; exit 1; }
          test -n "$IMAGE_REPOSITORY" || { echo 'Missing IMAGE_REPOSITORY variable'; exit 1; }
          test -n "${{ secrets.REGISTRY_USERNAME }}" || { echo 'Missing REGISTRY_USERNAME secret'; exit 1; }
          test -n "${{ secrets.REGISTRY_PASSWORD }}" || { echo 'Missing REGISTRY_PASSWORD secret'; exit 1; }

      - name: Compute image references
        id: image
        run: |
          {
            echo "image_name=$REGISTRY_HOST/$IMAGE_REPOSITORY"
            echo "sha_image=$REGISTRY_HOST/$IMAGE_REPOSITORY:$GITHUB_SHA"
            echo "mainline_image=$REGISTRY_HOST/$IMAGE_REPOSITORY:$MAINLINE_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.image.outputs.sha_image }}" \
            -t "${{ steps.image.outputs.mainline_image }}" \
            .

      - name: Push SHA tag
        run: docker push "${{ steps.image.outputs.sha_image }}"

      - name: Push mainline tag
        run: docker push "${{ steps.image.outputs.mainline_image }}"
