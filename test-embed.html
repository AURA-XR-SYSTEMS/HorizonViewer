<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Aura Embed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            margin-bottom: 10px;
        }
        p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
        }
        .embed-container {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 12px;
        }
        .code-block {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            overflow-x: auto;
        }
        code {
            color: #7dd3fc;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aura Embed Test</h1>
        <p>This page demonstrates embedding the Aura Viewer via iframe. The viewer is running on Cloud Run.</p>
        
        <div class="embed-container">
            <!-- Replace https://aura-embed-4501047095.us-central1.run.app with actual deployed URL -->
            <iframe 
                src="https://aura-embed-4501047095.us-central1.run.app/embed/demo"
                allowfullscreen
            ></iframe>
        </div>

        <div class="code-block">
            <code>&lt;iframe src="https://aura-embed-4501047095.us-central1.run.app/embed/demo" width="100%" height="600" frameborder="0" allowfullscreen&gt;&lt;/iframe&gt;</code>
        </div>
    </div>
</body>
</html>
